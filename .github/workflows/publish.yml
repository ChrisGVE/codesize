name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: []   # runs in parallel with the release job
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: |
          cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} 2>&1 | tee /tmp/publish.log; STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ] && grep -q "already exists" /tmp/publish.log; then
            echo "Version already published — skipping."
            exit 0
          fi
          exit $STATUS
